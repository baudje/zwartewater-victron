[DEFAULT]

; dbus-serialbattery config for Zwartewater
; 2x EVE MB31 8-cell LFP with JK BMS
; Aligned with dbus-aggregate-batteries config.ini

; ----- Battery hardware -----
BATTERY_ADDRESSES = 0x01, 0x02
BMS_TYPE = Jkbms_pb

; ----- Current limits -----
; Per battery: 60A charge (120A total via aggregate), 70A discharge (140A total)
MAX_BATTERY_CHARGE_CURRENT    = 60.0
MAX_BATTERY_DISCHARGE_CURRENT = 70.0

; ----- Cell voltage limits -----
; Aligned with aggregate driver settings
; Aggregate controls CVL via OWN_CHARGE_PARAMETERS — these are safety backstops
MAX_CELL_VOLTAGE   = 3.550
MIN_CELL_VOLTAGE   = 2.800
FLOAT_CELL_VOLTAGE = 3.375

; ----- Cell Voltage Current Management -----
; Taper charge current as cells approach limits
; NOTE: CVCM tapers to 0 at 3.55V, which would block aggregate's BALANCING_VOLTAGE
; (3.60V) if OWN_CHARGE_PARAMETERS were set to True. Currently safe because
; aggregate uses OWN_CHARGE_PARAMETERS = False (serialbattery controls CVL).
CVCM_ENABLE = True

CELL_VOLTAGES_WHILE_CHARGING      = 3.55, 3.50, 3.45, 3.30
MAX_CHARGE_CURRENT_CV_FRACTION    =    0, 0.2,  1,    1

CELL_VOLTAGES_WHILE_DISCHARGING   = 2.80, 2.90, 3.00, 3.10
MAX_DISCHARGE_CURRENT_CV_FRACTION =    0,  0.3,    1,    1

; ----- SoC reset -----
; Aggregate uses OWN_SOC — these are serialbattery's own counters (secondary)
SOC_RESET_CELL_VOLTAGE = 3.55
SOC_RESET_AFTER_DAYS = 15

SWITCH_TO_FLOAT_WAIT_FOR_SEC = 300

; ----- Temperature-based derating -----
; EVE MB31 datasheet: 0.05P at 0°C, 0.12P at 5°C, 0.3P at 10°C, 0.5P at 15°C+
DCCM_T_ENABLE = True

TEMPERATURES_WHILE_CHARGING      =    0,    2,    5,   10,   15,   20,   35,   40,   55
MAX_CHARGE_CURRENT_T_FRACTION    = 0.00, 0.10, 0.20, 0.80, 1.00, 1.00, 1.00, 0.40, 0.00

TEMPERATURES_WHILE_DISCHARGING   =  -20,    0,    5,   10,   15,   45,   55
MAX_DISCHARGE_CURRENT_T_FRACTION = 0.00, 0.20, 0.30, 0.40, 1.00, 1.00, 0.00

; ----- UI -----
GUI_PARAMETERS_SHOW_ADDITIONAL_INFO = True
TELEMETRY = False
