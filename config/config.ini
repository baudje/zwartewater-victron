[DEFAULT]

; ----- Needed hardware settings -----
; 2x EVE MB31 8s2p LFP batteries with JK BMS via dbus-serialbattery

NR_OF_BATTERIES = 2
NR_OF_CELLS_PER_BATTERY = 8
NR_OF_MPPTS = 1


; ----- DBus settings -----

BATTERY_SERVICE_NAME = com.victronenergy.battery
DCLOAD_SERVICE_NAME = com.victronenergy.dcload
BATTERY_PRODUCT_NAME_PATH = /ProductName
BATTERY_PRODUCT_NAME = SerialBattery
BATTERY_INSTANCE_NAME_PATH = /Serial
MULTI_KEYWORD = com.victronenergy.vebus
MPPT_KEYWORD = com.victronenergy.solarcharger
SMARTSHUNT_NAME_KEYWORD = SmartShunt
SMARTSHUNT_INSTANCE_NAME_PATH = /CustomName
SEARCH_TRIALS = 10
READ_TRIALS = 10


; ----- Current measurement -----
; JK BMS current is inaccurate — use SmartShunt LFP (instance 277) + Quattro + MPPT

CURRENT_FROM_VICTRON = True
USE_SMARTSHUNTS = [277]
INVERT_SMARTSHUNTS = False
IGNORE_SMARTSHUNT_ABSENCE = True


; ----- SoC -----
; Own coulomb counter with SmartShunt precision instead of JK BMS SoC

OWN_SOC = True
ZERO_SOC = False
CHARGE_SAVE_PRECISION = 0.0025
MAX_CELL_VOLTAGE_SOC_FULL = 3.55
MIN_CELL_VOLTAGE_SOC_EMPTY = 2.80


; ----- Charge/Discharge parameters -----
; EVE MB31: 3.65V max charge, 3.8V absolute max, 2.5V discharge cutoff

OWN_CHARGE_PARAMETERS = False

; 3.55V/cell daily — ~95% SoC, within EVE spec, benefits parallel FLA charging
CHARGE_VOLTAGE_LIST =
    3.55,   ; January
    3.55,   ; February
    3.55,   ; March
    3.55,   ; April
    3.55,   ; May
    3.55,   ; June
    3.55,   ; July
    3.55,   ; August
    3.55,   ; September
    3.55,   ; October
    3.55,   ; November
    3.55    ; December

; Balancing at 3.60V every 14 days — headroom for JK BMS active balancer
BALANCING_VOLTAGE = 3.60
BALANCING_REPETITION = 14
CELL_DIFF_MAX = 0.005

; Cell protection
MAX_CELL_VOLTAGE = 3.65
MIN_CELL_VOLTAGE = 2.80
MIN_CELL_HYSTERESIS = 0.2

; Charge efficiency
BATTERY_EFFICIENCY = 0.98

; Current limits — Quattro II 5000/120 is the charge bottleneck
MAX_CHARGE_CURRENT = 120
MAX_DISCHARGE_CURRENT = 150

; Charge current tapering: smooth ramp down as cells fill
CELL_CHARGE_LIMITING_VOLTAGE = 2.80, 2.90, 3.30, 3.50, 3.60, 3.65
CELL_CHARGE_LIMITED_CURRENT =  0.2,  1.0,  1.0, 0.8,  0.1,  0

; Discharge current limiting: smooth cutoff near empty
CELL_DISCHARGE_LIMITING_VOLTAGE = 2.80, 2.90, 3.00
CELL_DISCHARGE_LIMITED_CURRENT =  0,    0.05, 1

; Aggregation mode when OWN_CHARGE_PARAMETERS = False
KEEP_MAX_CVL = False


; ----- Logging -----

SEND_CELL_VOLTAGES = 1
LOGGING = INFO
LOG_PERIOD = 300
